services:
  - type: web
    name: biology-space-api
    runtime: node
    plan: free
    autoDeploy: false
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://biology-space-web.onrender.com

  - type: web
    name: biology-space-web
    runtime: static
    autoDeploy: false
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: VITE_API_URL
        value: https://biology-space-api.onrender.com/api
