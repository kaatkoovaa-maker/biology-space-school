<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>БиоЛогика</title>
  </head>
  <body>
    <div
      id="boot-status"
      style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top,#12214d 0%,#070816 45%,#02030a 100%);color:#e5f7ff;font-family:Segoe UI,sans-serif;z-index:9999;padding:24px;text-align:center;"
    >
      <div>
        <div style="font-size:32px;font-weight:700;letter-spacing:.08em;">БиоЛогика</div>
        <div style="margin-top:12px;font-size:16px;opacity:.82;">Загружаем карту эволюции к ЕГЭ...</div>
        <div
          id="boot-help"
          style="display:none;margin-top:18px;font-size:14px;line-height:1.7;opacity:.9;max-width:360px;"
        >
          Если экран завис, открой
          <a href="/demo-preview.html" style="color:#7df9ff;">demo-preview.html</a>
          или обнови страницу.
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.setTimeout(function () {
        var bootStatus = document.getElementById("boot-status");
        var bootHelp = document.getElementById("boot-help");
        if (bootHelp) {
          bootHelp.style.display = "block";
        }
        if (bootStatus) {
          bootStatus.style.pointerEvents = "none";
          bootStatus.style.opacity = "0";
          bootStatus.style.transition = "opacity 0.35s ease";
        }
      }, 3500);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
